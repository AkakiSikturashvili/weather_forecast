<div class="container mt-4">
  <h2 class="mb-4">My Weather Dashboard</h2>

  <!-- row-cols-1 (მობილურზე 1 სვეტი), row-cols-md-2 (ტაბლეტსა და მონიტორზე 2 სვეტი) -->
  <div class="row row-cols-1 row-cols-md-2 g-4">
    <!-- თბილისის ქარდი -->
    <div class="col">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Tbilisi</h5>
          <p class="card-text">Temperature: 24°C</p>
          <a href="/api/weather/Tbilisi/" class="btn btn-outline-primary btn-sm"
            >View API Data</a
          >
        </div>
      </div>
    </div>

    <!-- ბათუმის ქარდი -->
    <div class="col">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Batumi</h5>
          <p class="card-text">Temperature: 22°C</p>
          <a href="/api/weather/Batumi/" class="btn btn-outline-primary btn-sm"
            >View API Data</a
          >
        </div>
      </div>
    </div>
  </div>
</div>
